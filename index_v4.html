<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>麥塊AI世界冒險王(1)知識大挑戰</title>
  <style>
    :root {
      --deep-blue: #06183b;
      --deep-blue-2: #0b2d66;
      --bright-blue: #13b7ff;
      --bright-blue-2: #75dcff;
      --red: #ff334f;
      --red-dark: #9b1730;
      --gold: #ffd34d;
      --gold-2: #ffb703;
      --white: #ffffff;
      --soft-white: #edf8ff;
      --green: #2bd97f;
      --green-dark: #0b8f53;
      --pink: #ffb7d5;
      --pink-2: #ffe3ef;
      --ink: #13223f;
      --card: rgba(255, 255, 255, 0.94);
      --shadow: rgba(0, 0, 0, 0.35);
      --radius: 22px;
      --pixel-border: 4px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", Arial, sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at 10% 16%, rgba(255, 183, 213, 0.5) 0 5px, transparent 6px),
        radial-gradient(circle at 78% 10%, rgba(255, 227, 239, 0.38) 0 7px, transparent 8px),
        radial-gradient(circle at 36% 85%, rgba(255, 211, 77, 0.22) 0 8px, transparent 9px),
        linear-gradient(135deg, rgba(24, 184, 255, 0.18) 25%, transparent 25%) 0 0 / 48px 48px,
        linear-gradient(225deg, rgba(255, 183, 213, 0.17) 25%, transparent 25%) 0 0 / 48px 48px,
        linear-gradient(160deg, #061636 0%, #09285b 44%, #12346d 72%, #061636 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        repeating-linear-gradient(0deg, transparent 0 31px, rgba(255, 255, 255, 0.045) 32px),
        repeating-linear-gradient(90deg, transparent 0 31px, rgba(255, 255, 255, 0.035) 32px);
      mix-blend-mode: screen;
    }

    body::after {
      background:
        radial-gradient(circle at 8% 78%, rgba(255, 183, 213, 0.26), transparent 19%),
        radial-gradient(circle at 88% 28%, rgba(24, 184, 255, 0.22), transparent 20%),
        radial-gradient(circle at 55% 8%, rgba(255, 211, 77, 0.18), transparent 18%);
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1100px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 46px;
    }

    .hero-card,
    .status-card,
    .quiz-card {
      position: relative;
      border-radius: var(--radius);
      border: var(--pixel-border) solid rgba(255, 255, 255, 0.9);
      box-shadow:
        0 16px 0 rgba(0, 0, 0, 0.18),
        0 22px 42px rgba(0, 0, 0, 0.34),
        inset 0 0 0 3px rgba(255, 211, 77, 0.3);
      overflow: hidden;
    }

    .hero-card {
      background:
        linear-gradient(135deg, rgba(7, 26, 61, 0.97), rgba(13, 47, 99, 0.93)),
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.08) 0 8px, transparent 8px 16px);
      padding: clamp(20px, 4vw, 34px);
      margin-bottom: 18px;
    }

    .hero-card::before,
    .quiz-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 0 48%, rgba(255, 255, 255, 0.08) 49% 51%, transparent 52%),
        linear-gradient(0deg, transparent 0 48%, rgba(255, 255, 255, 0.06) 49% 51%, transparent 52%);
      background-size: 42px 42px;
      opacity: 0.32;
      pointer-events: none;
    }

    .hero-content,
    .quiz-inner {
      position: relative;
      z-index: 1;
    }

    .tag-pill {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      color: var(--deep-blue);
      background: linear-gradient(135deg, var(--gold), #fff3ac);
      border: 3px solid var(--white);
      box-shadow: 0 6px 0 rgba(91, 58, 0, 0.35);
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 950;
      font-size: clamp(0.9rem, 1.8vw, 1.06rem);
    }

    h1 {
      position: relative;
      margin: 18px 0 10px;
      line-height: 1.08;
      letter-spacing: 1px;
      font-size: clamp(2.05rem, 6vw, 4.25rem);
      text-shadow:
        4px 4px 0 #00122d,
        7px 7px 0 rgba(255, 51, 79, 0.8),
        0 0 20px rgba(24, 184, 255, 0.55);
    }

    .subtitle {
      position: relative;
      margin: 0;
      color: var(--soft-white);
      font-size: clamp(1.04rem, 2.35vw, 1.36rem);
      line-height: 1.7;
      font-weight: 750;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      font: inherit;
    }

    .btn {
      cursor: pointer;
      border: 0;
      border-radius: 18px;
      padding: 14px 18px;
      color: var(--white);
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      font-weight: 950;
      letter-spacing: 0.8px;
      box-shadow:
        0 7px 0 rgba(0, 0, 0, 0.32),
        inset 0 -4px 0 rgba(0, 0, 0, 0.18),
        inset 0 2px 0 rgba(255, 255, 255, 0.25);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
      min-height: 56px;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
      box-shadow:
        0 9px 0 rgba(0, 0, 0, 0.32),
        inset 0 -4px 0 rgba(0, 0, 0, 0.18),
        inset 0 2px 0 rgba(255, 255, 255, 0.25);
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow:
        0 2px 0 rgba(0, 0, 0, 0.32),
        inset 0 -4px 0 rgba(0, 0, 0, 0.18);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--bright-blue), #006eff);
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-2));
      color: #182033;
    }

    .btn-red {
      background: linear-gradient(135deg, var(--red), #d91c42);
    }

    .status-card {
      display: grid;
      grid-template-columns: 1fr 1fr 1.5fr;
      gap: 12px;
      margin: 18px 0;
      padding: 16px;
      background: rgba(7, 26, 61, 0.9);
    }

    .stat {
      background: rgba(255, 255, 255, 0.95);
      color: var(--deep-blue);
      border: 3px solid rgba(24, 184, 255, 0.9);
      border-radius: 18px;
      padding: 14px;
      box-shadow: inset -5px -5px 0 rgba(0, 0, 0, 0.07);
    }

    .stat small {
      display: block;
      color: #496385;
      font-size: 0.88rem;
      font-weight: 900;
      margin-bottom: 5px;
    }

    .stat strong {
      display: block;
      font-size: clamp(1.45rem, 4vw, 2.1rem);
      line-height: 1;
      font-weight: 1000;
    }

    .progress-wrap {
      align-self: center;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--white);
      font-weight: 900;
    }

    .progress {
      height: 24px;
      padding: 4px;
      background: #031025;
      border: 3px solid rgba(255, 255, 255, 0.8);
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 0 0 2px rgba(24, 184, 255, 0.22);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background:
        repeating-linear-gradient(45deg, rgba(255,255,255,0.34) 0 9px, transparent 9px 18px),
        linear-gradient(90deg, var(--bright-blue), var(--gold));
      transition: width 0.35s ease;
    }

    .quiz-card {
      background: var(--card);
      color: var(--ink);
      padding: clamp(16px, 3vw, 30px);
      min-height: 450px;
    }

    .question-top {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .level-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 9px 13px;
      color: var(--white);
      background: linear-gradient(135deg, var(--deep-blue-2), var(--bright-blue));
      font-weight: 950;
      border: 3px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.22);
    }

    .clue-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 16px;
      padding: 9px 13px;
      color: var(--deep-blue);
      background: linear-gradient(135deg, var(--pink-2), var(--gold));
      font-weight: 950;
      border: 3px solid rgba(7, 26, 61, 0.75);
    }

    .question {
      position: relative;
      margin: 0 0 18px;
      padding: 20px;
      border-radius: 20px;
      border: 4px solid var(--deep-blue);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(238, 248, 255, 0.98));
      box-shadow: inset -7px -7px 0 rgba(7, 26, 61, 0.08);
      font-size: clamp(1.22rem, 3.2vw, 2rem);
      line-height: 1.45;
      font-weight: 950;
    }

    .options {
      position: relative;
      display: grid;
      gap: 14px;
      margin: 18px 0;
    }

    .option-btn {
      width: 100%;
      min-height: 76px;
      text-align: left;
      cursor: pointer;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: center;
      border: 4px solid var(--deep-blue);
      border-radius: 20px;
      padding: 14px 16px;
      color: var(--deep-blue);
      background:
        linear-gradient(180deg, #ffffff, #eaf7ff);
      font-size: clamp(1.08rem, 2.8vw, 1.42rem);
      font-weight: 900;
      box-shadow:
        0 8px 0 rgba(7, 26, 61, 0.25),
        inset -6px -6px 0 rgba(24, 184, 255, 0.12);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    .option-btn:not(:disabled):hover {
      transform: translateY(-2px) scale(1.005);
      background: linear-gradient(180deg, #ffffff, #d8f3ff);
      box-shadow:
        0 10px 0 rgba(7, 26, 61, 0.25),
        0 0 0 4px rgba(24, 184, 255, 0.2),
        inset -6px -6px 0 rgba(24, 184, 255, 0.12);
    }

    .option-btn:disabled {
      cursor: not-allowed;
    }

    .letter {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      border: 3px solid currentColor;
      background: rgba(255, 255, 255, 0.82);
      font-size: 1.24rem;
      font-weight: 1000;
      flex: 0 0 auto;
    }

    .option-btn.correct {
      border-color: var(--gold-2);
      color: #132818;
      background:
        linear-gradient(180deg, #fff5b8, #c9ffd8);
      box-shadow:
        0 8px 0 rgba(17, 101, 58, 0.38),
        0 0 22px rgba(255, 211, 77, 0.6),
        inset -6px -6px 0 rgba(40, 209, 124, 0.18);
      animation: popCorrect 0.45s ease both;
    }

    .option-btn.wrong {
      border-color: var(--red-dark);
      color: #ffffff;
      background:
        linear-gradient(180deg, var(--red), var(--red-dark));
      box-shadow:
        0 8px 0 rgba(80, 0, 14, 0.4),
        0 0 18px rgba(255, 51, 79, 0.42),
        inset -6px -6px 0 rgba(0, 0, 0, 0.16);
      animation: shakeWrong 0.45s ease both;
    }

    .option-btn.dimmed {
      opacity: 0.7;
      transform: none;
      box-shadow:
        0 5px 0 rgba(7, 26, 61, 0.18),
        inset -6px -6px 0 rgba(24, 184, 255, 0.08);
    }

    .feedback {
      display: none;
      position: relative;
      margin-top: 18px;
      border-radius: 20px;
      border: 4px solid var(--deep-blue);
      background:
        linear-gradient(135deg, rgba(7, 26, 61, 0.96), rgba(13, 47, 99, 0.96));
      color: var(--white);
      padding: 18px;
      box-shadow:
        inset 0 0 0 3px rgba(255, 211, 77, 0.22),
        0 8px 0 rgba(0, 0, 0, 0.24);
    }

    .feedback.show {
      display: block;
      animation: riseIn 0.35s ease both;
    }

    .feedback h3 {
      margin: 0 0 10px;
      font-size: clamp(1.16rem, 2.8vw, 1.5rem);
      color: var(--gold);
    }

    .feedback p {
      margin: 8px 0;
      font-size: clamp(1rem, 2.4vw, 1.18rem);
      line-height: 1.65;
      font-weight: 750;
    }

    .feedback .answer-line {
      color: #d7f7ff;
      font-weight: 950;
    }

    .next-area {
      display: none;
      justify-content: flex-end;
      margin-top: 18px;
    }

    .next-area.show {
      display: flex;
    }

    .start-screen,
    .result-screen {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 420px;
      text-align: center;
      padding: 18px;
    }

    .start-box,
    .result-box {
      width: min(780px, 100%);
      border: 4px solid var(--deep-blue);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(232,247,255,0.96));
      padding: clamp(18px, 4vw, 34px);
      box-shadow: inset -8px -8px 0 rgba(7, 26, 61, 0.08);
    }

    .start-box h2,
    .result-box h2 {
      margin: 0 0 12px;
      color: var(--deep-blue);
      font-size: clamp(1.65rem, 4.6vw, 2.8rem);
      text-shadow: 2px 2px 0 rgba(255, 211, 77, 0.45);
    }

    .start-box p,
    .result-box p {
      margin: 10px auto;
      max-width: 680px;
      color: #344766;
      font-size: clamp(1.02rem, 2.6vw, 1.25rem);
      line-height: 1.65;
      font-weight: 800;
    }

    .result-score {
      display: inline-grid;
      place-items: center;
      width: min(260px, 70vw);
      aspect-ratio: 1;
      margin: 18px auto;
      border-radius: 30px;
      border: 6px solid var(--deep-blue);
      color: var(--deep-blue);
      background:
        linear-gradient(135deg, var(--gold), #fff4b5 55%, var(--bright-blue-2));
      box-shadow:
        0 12px 0 rgba(7, 26, 61, 0.24),
        inset -10px -10px 0 rgba(0, 0, 0, 0.08);
      font-weight: 1000;
    }

    .result-score span {
      display: block;
      font-size: clamp(3rem, 12vw, 5.5rem);
      line-height: 0.9;
    }

    .result-score small {
      font-size: clamp(1rem, 3vw, 1.3rem);
      color: #25405e;
    }

    .hidden {
      display: none !important;
    }

    .footer-note {
      margin-top: 20px;
      text-align: center;
      color: rgba(255, 255, 255, 0.86);
      font-size: 0.95rem;
      font-weight: 750;
    }

    @keyframes popCorrect {
      0% { transform: scale(1); }
      45% { transform: scale(1.035); }
      100% { transform: scale(1); }
    }

    @keyframes shakeWrong {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 880px) {
      .status-card {
        grid-template-columns: 1fr 1fr;
      }

      .progress-wrap {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 18px, 1100px);
        padding-top: 12px;
      }

      .hero-card,
      .quiz-card {
        border-width: 3px;
        border-radius: 18px;
      }

      .hero-card {
        padding: 18px;
      }

      .tag-pill {
        border-radius: 18px;
      }

      .status-card {
        grid-template-columns: 1fr;
      }

      .progress-wrap {
        grid-column: auto;
      }

      .status-card {
        padding: 12px;
      }

      .question-top {
        align-items: flex-start;
        flex-direction: column;
      }

      .option-btn {
        min-height: 68px;
        grid-template-columns: 40px 1fr;
        padding: 12px;
        gap: 10px;
        border-width: 3px;
      }

      .letter {
        width: 40px;
        height: 40px;
      }

      .next-area,
      .controls {
        justify-content: stretch;
      }

      .btn,
      .next-area .btn {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero-card" aria-label="網站標題區">
      <div class="hero-content">
        <div class="tag-pill">凱瑟琳・強森 / 霍華德・卡特 / 諾貝爾 / 愛因斯坦 / 萊特兄弟 5位名人</div>
        <h1>麥塊AI世界冒險王(1)<br />知識大挑戰</h1>
        <p class="subtitle">
          題目以五位名人的事蹟、典故與冷知識為主，每輪隨機抽出 10 題基礎題與 5 題進階題。
        </p>

        <div class="controls">
          <button class="btn btn-primary" id="startBtn">開始挑戰</button>
          <button class="btn btn-gold" id="restartTopBtn">重新挑戰</button>
        </div>
      </div>
    </section>

    <section class="status-card" aria-label="挑戰進度">
      <div class="stat">
        <small>目前關卡</small>
        <strong id="questionCounter">0 / 15</strong>
      </div>
      <div class="stat">
        <small>目前分數</small>
        <strong id="scoreCounter">0</strong>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>線索破解進度</span>
          <span id="progressText">0%</span>
        </div>
        <div class="progress" aria-label="進度條">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </section>

    <section class="quiz-card" id="quizCard" aria-live="polite">
      <div class="quiz-inner">
        <div class="start-screen" id="startScreen">
          <div class="start-box">
            <h2>準備進入名人知識任務</h2>
            <p>
              前 10 題為基礎題，後 5 題為進階題。每題只有一次作答機會，答對加 10 分，滿分 150 分。
            </p>
            <button class="btn btn-primary" id="startBtn2">開始第一個挑戰</button>
          </div>
        </div>

        <div class="question-screen hidden" id="questionScreen">
          <div class="question-top">
            <span class="level-badge" id="levelBadge">基礎題庫</span>
            <span class="clue-badge" id="clueBadge">線索 1 / 15</span>
          </div>

          <h2 class="question" id="questionText">題目載入中</h2>

          <div class="options" id="optionsBox"></div>

          <section class="feedback" id="feedbackPanel">
            <h3 id="feedbackTitle">解答說明與線索</h3>
            <p class="answer-line" id="answerLine"></p>
            <p id="explainText"></p>
          </section>

          <div class="next-area" id="nextArea">
            <button class="btn btn-gold" id="nextBtn">下一個挑戰</button>
          </div>
        </div>

        <div class="result-screen hidden" id="resultScreen">
          <div class="result-box">
            <h2>挑戰結算完成</h2>
            <div class="result-score">
              <div>
                <span id="finalScore">0</span>
                <small>/ 150 分</small>
              </div>
            </div>
            <p id="finalComment">評語載入中</p>
            <button class="btn btn-red" id="restartBtn">重新挑戰</button>
          </div>
        </div>
      </div>
    </section>

    <p class="footer-note">社團法人台灣資訊教育發展協會</p>
  </main>

  <script>
    /*
      ==========================================================
      題庫修改區
      ----------------------------------------------------------
      若要更換題目，只需修改下面兩個陣列：
      1. easyQuestions：基礎題庫，共 35 題
      2. hardQuestions：進階題庫，共 15 題

      出題者只要把正確答案固定放在 o 陣列第 0 個位置，
      並把 a 設為 0 即可。
      網頁執行時會自動洗牌 A / B / C 選項，
      正確答案判斷與提示會依照洗牌後的位置重新計算。
      ==========================================================
    */

    const easyQuestions = [
      {
            "q": "萊特兄弟出生與成長的國家是哪一個？",
            "o": [
                  "美國",
                  "瑞典",
                  "埃及"
            ],
            "a": 0,
            "e": "萊特兄弟是美國俄亥俄州代頓出身的兄弟檔，後來成為航空史上的重要人物。"
      },
      {
            "q": "萊特兄弟中的哥哥是誰？",
            "o": [
                  "威爾伯・萊特",
                  "奧維爾・萊特",
                  "阿爾弗雷德・諾貝爾"

            "e": "在攝影與記錄技術尚未像今日普及時，精準繪圖是考古記錄的重要能力。"
      },
      {
            "q": "圖坦卡門陵墓保存許多文物，對研究古埃及最大的價值是什麼？",
            "o": [
                  "提供了解王室生活、信仰與工藝的證據",
                  "證明古埃及人發明飛機",
                  "證明諾貝爾獎起源於埃及"
            ],
            "a": 0,
            "e": "大量文物能幫助研究者理解古埃及王室生活、宗教信仰、藝術技術與喪葬文化。"
      }
];

    const TOTAL_QUESTIONS = 15;
    const EASY_COUNT = 10;
    const HARD_COUNT = 5;
    const SCORE_PER_QUESTION = 10;

    let quizQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;
    let shuffledOptions = [];
    let correctIndex = 0;

    const startBtn = document.getElementById("startBtn");
    const startBtn2 = document.getElementById("startBtn2");
    const restartTopBtn = document.getElementById("restartTopBtn");
    const restartBtn = document.getElementById("restartBtn");
    const nextBtn = document.getElementById("nextBtn");

    const questionCounter = document.getElementById("questionCounter");
    const scoreCounter = document.getElementById("scoreCounter");
    const progressText = document.getElementById("progressText");
    const progressBar = document.getElementById("progressBar");

    const startScreen = document.getElementById("startScreen");
    const questionScreen = document.getElementById("questionScreen");
    const resultScreen = document.getElementById("resultScreen");

    const levelBadge = document.getElementById("levelBadge");
    const clueBadge = document.getElementById("clueBadge");
    const questionText = document.getElementById("questionText");
    const optionsBox = document.getElementById("optionsBox");
    const feedbackPanel = document.getElementById("feedbackPanel");
    const feedbackTitle = document.getElementById("feedbackTitle");
    const answerLine = document.getElementById("answerLine");
    const explainText = document.getElementById("explainText");
    const nextArea = document.getElementById("nextArea");

    const finalScore = document.getElementById("finalScore");
    const finalComment = document.getElementById("finalComment");

    function shuffleArray(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function sampleQuestions(sourceArray, count) {
      return shuffleArray(sourceArray).slice(0, count);
    }

    function buildQuiz() {
      const easySet = sampleQuestions(easyQuestions, EASY_COUNT).map(item => ({ ...item, level: "基礎題庫" }));
      const hardSet = sampleQuestions(hardQuestions, HARD_COUNT).map(item => ({ ...item, level: "進階題庫" }));
      return [...easySet, ...hardSet];
    }

    function resetState() {
      quizQuestions = buildQuiz();
      currentIndex = 0;
      score = 0;
      answered = false;
      updateStatus();
    }

    function startChallenge() {
      resetState();
      startScreen.classList.add("hidden");
      resultScreen.classList.add("hidden");
      questionScreen.classList.remove("hidden");
      showQuestion();
    }

    function showQuestion() {
      answered = false;
      feedbackPanel.classList.remove("show");
      nextArea.classList.remove("show");
      optionsBox.innerHTML = "";

      const current = quizQuestions[currentIndex];

      levelBadge.textContent = current.level;
      clueBadge.textContent = `線索 ${currentIndex + 1} / ${TOTAL_QUESTIONS}`;
      questionText.textContent = current.q;

      shuffledOptions = shuffleArray(
        current.o.map((text, originalIndex) => ({
          text,
          originalIndex
        }))
      );

      correctIndex = shuffledOptions.findIndex(option => option.originalIndex === current.a);

      shuffledOptions.forEach((option, index) => {
        const button = document.createElement("button");
        button.className = "option-btn";
        button.type = "button";
        button.dataset.index = index;
        button.innerHTML = `
          <span class="letter">${String.fromCharCode(65 + index)}</span>
          <span>${escapeHTML(option.text)}</span>
        `;
        button.addEventListener("click", () => chooseAnswer(index));
        optionsBox.appendChild(button);
      });

      updateStatus();
    }

    function chooseAnswer(selectedIndex) {
      if (answered) return;

      answered = true;
      const current = quizQuestions[currentIndex];
      const buttons = [...optionsBox.querySelectorAll(".option-btn")];
      const isCorrect = selectedIndex === correctIndex;

      if (isCorrect) {
        score += SCORE_PER_QUESTION;
      }

      buttons.forEach((button, index) => {
        button.disabled = true;
        if (index === correctIndex) {
          button.classList.add("correct");
        } else if (index === selectedIndex) {
          button.classList.add("wrong");
        } else {
          button.classList.add("dimmed");
        }
      });

      const correctLetter = String.fromCharCode(65 + correctIndex);
      const correctText = shuffledOptions[correctIndex].text;

      feedbackTitle.textContent = isCorrect ? "答對了！線索成功點亮" : "答錯了！線索需要重新判讀";
      answerLine.textContent = `正確答案：${correctLetter}. ${correctText}`;
      explainText.textContent = current.e;
      feedbackPanel.classList.add("show");

      nextBtn.textContent = currentIndex === TOTAL_QUESTIONS - 1 ? "查看結算" : "下一個挑戰";
      nextArea.classList.add("show");

      updateStatus();
    }

    function nextQuestion() {
      if (!answered) return;

      if (currentIndex >= TOTAL_QUESTIONS - 1) {
        showResult();
        return;
      }

      currentIndex++;
      showQuestion();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showResult() {
      questionScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");
      finalScore.textContent = score;

      if (score >= 130) {
        finalComment.textContent = "完美破案！你已經掌握大部分觀念。";
      } else if (score >= 90) {
        finalComment.textContent = "表現不錯！再複習幾個觀念，就能更穩。";
      } else {
        finalComment.textContent = "線索還有點混亂，重新挑戰一次，下一輪就能抓到關鍵重點。";
      }

      updateStatus(true);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function updateStatus(forceComplete = false) {
      const answeredCount = forceComplete ? TOTAL_QUESTIONS : currentIndex + (answered ? 1 : 0);
      const progressPercent = Math.round((answeredCount / TOTAL_QUESTIONS) * 100);

      questionCounter.textContent = `${Math.min(answeredCount, TOTAL_QUESTIONS)} / ${TOTAL_QUESTIONS}`;
      scoreCounter.textContent = score;
      progressText.textContent = `${progressPercent}%`;
      progressBar.style.width = `${progressPercent}%`;
    }

    function escapeHTML(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    startBtn.addEventListener("click", startChallenge);
    startBtn2.addEventListener("click", startChallenge);
    restartTopBtn.addEventListener("click", startChallenge);
    restartBtn.addEventListener("click", startChallenge);
    nextBtn.addEventListener("click", nextQuestion);

    updateStatus();
  </script>
</body>
</html>
